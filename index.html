<script>
// 动态创建audio元素，避免HTML标签在微信浏览器中渲染异常字符
(function(){
  const a=document.createElement('audio');
  a.id='bgm';a.loop=true;a.preload='auto';a.src='music.mp3';
  document.body.appendChild(a);
})();
let musicStarted=false;
function tryStartMusic(){
  if(musicStarted)return;
  const a=document.getElementById('bgm');
  if(!a||!a.src)return;
  a.volume=0.12;
  a.play().then(()=>{
    musicStarted=true;
    document.getElementById('musicBtn').classList.add('on');
  }).catch(()=>{});
}
function toggleMusic(){
  const a=document.getElementById('bgm');
  const btn=document.getElementById('musicBtn');
  if(!a)return;
  if(a.paused){
    a.volume=0.12;
    a.play().then(()=>{btn.classList.add('on')}).catch(()=>{});
  }else{
    a.pause();btn.classList.remove('on');
  }
}
// 用户首次交互时启动音乐
document.addEventListener('click',function(){tryStartMusic()},{once:false});
document.addEventListener('touchstart',function(){tryStartMusic()},{once:false});

function showToast(msg,dur){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur||2000);
}

function stripP(s){
  return s.replace(/[\u3002\uff0c\u3001\uff1b\uff01\u2014\u2026\u300a\u300b\u201c\u201d\u2018\u2019\uff08\uff09\u3010\u3011.,;!?~\-—\u00b7\u30fb\u2022]/g,'');
}
function hl(s){
  return s.replace(/\*\*([\s\S]+?)\*\*/g,'<span class="hl">$1</span>');
}
function fmt(s){
  return hl(stripP(s));
}

BOND:{pos:'你正在薇连期',exp:'你一直在照顾关系，照顾别人的感受。好像什么时候开始，你最先退的那一步，变成了习惯。',light:'光不在"被理解"里。光在你终于允许自己说不出口的那一刻。',one:'你一直在照顾别人。也许现在，轮到你被看见一次了。'},
GROUND:{pos:'你正在薇稳期',exp:'你没有解决什么。也没有变得更厉害。只是终于停下来，看见了那个一直被你落在后面的人。',light:'你已经在回来了。不是回到过去，是回到自己。',one:'不是变好了。是终于坐下来了。而坐下来，就已经是开始。'},
LIGHT:{pos:'你正在薇光期',exp:'光已经在了。不是突然亮起来的，是很久以前就有的，只是你一直在赶路，没注意到。',light:'光不在终点。光就在你开始能感受到风的那一刻。',one:'你已经不在最暗的地方了。虽然问题还在，但你，也在。'},
ASCENT:{pos:'你正在薇生期',exp:'你已经在变了。不是突然变好的，是慢慢地、自己都没注意地，开始往回走了。',light:'你已经是光了。下一步不是找到光，是让光继续走。',one:'原来，一直都在。你找的从来不是答案，而是自己。'}
};

const CN={FLOW:'薇流',BOND:'薇连',GROUND:'薇稳',LIGHT:'薇光',ASCENT:'薇生'};
const CD={FLOW:'生命能量正在流失的阶段',BOND:'关系连接正在消耗你的阶段',GROUND:'重新回到自己的阶段',LIGHT:'光正在慢慢回来的阶段',ASCENT:'生命力重新开始生长的阶段'};
const CC={FLOW:'#e88a8a',BOND:'#e8a0bf',GROUND:'#8ac8a0',LIGHT:'#e8c170',ASCENT:'#b8a0d8'};
const KEYS=['FLOW','BOND','GROUND','LIGHT','ASCENT'];
const VMAP={F:'FLOW',B:'BOND',G:'GROUND',L:'LIGHT',A:'ASCENT'};

let choices=[];
let userName='';
let step=0;

function calc(){
  let sc={FLOW:0,BOND:0,GROUND:0,LIGHT:0,ASCENT:0};
  choices.forEach((c,i)=>{
    if(i<VM.length){
      const m=VM[i][c];
      if(m) for(let k in m){const fk=VMAP[k]||k;if(sc[fk]!==undefined)sc[fk]+=m[k]}
    }
  });
  let total=KEYS.reduce((s,k)=>s+sc[k],0);
  if(total===0&&choices.length>0){KEYS.forEach(k=>sc[k]=1);total=KEYS.length}
  const pct={};KEYS.forEach(k=>pct[k]=Math.round(sc[k]/total*100));
  const sorted=KEYS.slice().sort((a,b)=>sc[b]-sc[a]);
  return{sc,pct,primary:sorted[0],secondary:sorted[1],isTr:Math.abs(sc[sorted[0]]-sc[sorted[1]])<=2};
}

function makeReport(){
  const r=calc();
  const name=userName||'你';
  const rp=RP[r.primary];
  try{submitData(r,name)}catch(e){}
  let bars='';
  KEYS.forEach(k=>{
    bars+=`<div class="color-bar"><div class="dot" style="background:${CC[k]}"></div><div class="name">${CN[k]}</div><div class="bar-bg"><div class="bar-fill" style="width:${r.pct[k]}%;background:${CC[k]}"></div></div><div class="pct">${r.pct[k]}%</div></div>`;
  });
  if(r.isTr){
    const rs=RP[r.secondary];
    return `<div class="report-wrap">
<div class="report-title">🌗 你的人生状态显影</div>
<div class="report-sub">你现在所在的位置，以及正在回来的方向</div>
<div class="divider"></div>
<p style="text-align:center;color:#bfb8a8;line-height:2;margin:0.8rem 0">${name}，这是你此刻的显影</p>
<div class="report-section"><h3>你的状态正在过渡</h3><p>此刻的你，似乎正站在两个阶段之间<br>一部分的你，${CD[r.primary]}<br>另一部分的你，${CD[r.secondary]}</p></div>
<div class="report-section"><h3>在人生状态显影系统里</h3>
<div class="tag-row"><span class="tag-box" style="color:${CC[r.primary]}">${CN[r.primary]} ${r.primary}</span><span class="tag-desc">${CD[r.primary]}</span></div>
<div class="tag-row"><span class="tag-box" style="color:${CC[r.secondary]}">${CN[r.secondary]} ${r.secondary}</span><span class="tag-desc">${CD[r.secondary]}</span></div>
</div>
<div class="report-section"><h3>你的能量结构</h3>${bars}</div>
<div class="report-section"><h3>一句话看见</h3><p style="color:#e8c170">${rp.one}</p><p style="margin-top:0.5rem">同时——</p><p style="color:#e8c170">${rs.one}</p></div>
<p style="text-align:center;color:#5a5548;font-size:0.78rem;margin-top:0.8rem">你不在某个固定的位置。你正在经过。</p>
</div>`;
  }
  return `<div class="report-wrap">
<div class="report-title">🌗 你的人生状态显影</div>
<div class="report-sub">你现在所在的位置，以及正在回来的方向</div>
<div class="divider"></div>
<p style="text-align:center;color:#bfb8a8;line-height:2;margin:0.8rem 0">${name}，这是你此刻的显影</p>
<div class="report-section"><h3>1 你的当前状态</h3><p style="color:#e8c170">${fmt(rp.pos)}</p><p style="margin-top:0.3rem">${fmt(rp.exp)}</p></div>
<div class="report-section"><h3>2 你的能量结构</h3>${bars}</div>
<div class="report-section"><h3>3 光从哪里来</h3><p>${fmt(rp.light)}</p></div>
<div class="report-section"><h3>4 一句话看见</h3><p style="color:#e8c170;font-size:0.95rem">${fmt(rp.one)}</p></div>
</div>`;
}

function go(idx){
  const app=document.getElementById('app');
  const d=DATA[idx];
  let h='';

  if(d.id==='open'){
    let groupsHtml=d.groups.map(g=>`<div class="text-group"><div class="text">${fmt(g)}</div></div>`).join('');
    h=`<div class="scene active" data-i="${idx}">
<div class="moon">${d.moon}</div>
<div class="title">${d.title}</div>
<div class="divider"></div>
${groupsHtml}
<div class="input-wrap"><input type="text" id="ni" placeholder="留下你的名字" maxlength="20"></div>
<button class="btn btn-primary" onclick="doStart()">${d.btn}</button>
</div>`;
  }else if(d.id==='report'){
    h=`<div class="scene active" data-i="${idx}" style="justify-content:flex-start;padding-top:2.5rem">
<div class="divider"></div>
${makeReport()}
<div style="height:1.5rem"></div>
<div class="action-group">
<button class="action-btn" onclick="saveReport()">🌗 保存这一刻</button>
<div class="action-sub">这一页属于此刻的你</div>
<button class="action-btn secondary" onclick="go(step+1)">继续显影</button>
<div class="action-sub">看看这些痕迹 为什么会出现在你的生命里</div>
<button class="action-btn tertiary" onclick="restartExperience()">再走一次这段路</button>
<div class="action-sub">当状态改变 选择也会改变</div>
</div>
<div style="height:2.5rem"></div>
</div>`;
  }else if(d.id==='bridge1'){
    h=`<div class="scene active" data-i="${idx}">
<div class="divider"></div>
<div class="scene-text">${fmt(d.body)}</div>
<button class="btn btn-primary" onclick="go(step+1)">${d.btn}</button>
</div>`;
  }else if(d.id==='bridge2'){
    h=`<div class="scene active" data-i="${idx}">
<div class="divider"></div>
<div class="scene-text">${fmt(d.body)}</div>
<button class="btn btn-primary" onclick="go(step+1)">${d.btn}</button>
</div>`;
  }else if(d.id==='unlock'){
    h=`<div class="scene active" data-i="${idx}">
<div class="divider"></div>
<div class="scene-text">${fmt(d.body)}</div>
<button class="btn btn-primary" onclick="go(step+1)">${d.btn}</button>
</div>`;
  }else if(d.id==='wechat'){
    h=`<div class="scene active" data-i="${idx}">
<div class="divider"></div>
<div class="scene-text">${fmt(d.body)}</div>
<div style="height:2rem"></div>
<div class="divider"></div>
<p style="color:#5a5548;font-size:0.75rem;text-align:center;margin:0.5rem 0;letter-spacing:0.05em">打开微信 搜索添加</p>
<p style="color:#e8c170;font-size:1.05rem;letter-spacing:0.15em;margin:0.4rem 0;text-align:center;font-weight:500">${d.wx}</p>
<button class="copy-btn" onclick="copyWx()">复制微信号</button>
<div style="height:0.5rem"></div>
<button class="share-btn" onclick="shareLink()">送TA一次看见自己的机会</button>
<div style="height:1.5rem"></div>
<button class="action-btn tertiary" onclick="restartExperience()" style="max-width:240px">再走一次这段路</button>
<p style="color:#3a3530;font-size:0.68rem;text-align:center;margin-top:1rem;letter-spacing:0.06em;line-height:1.7">第一次选择 记录的是最真实的当下<br>再次进入 或许会看见新的自己</p>
<p style="color:#3a3530;font-size:0.7rem;text-align:center;margin-top:1.2rem;letter-spacing:0.08em">薇光跃迁显影师 · 等你</p>
</div>`;
  }else if(d.trans!==undefined){
    const btnId='tb_'+idx;
    h=`<div class="scene active" data-i="${idx}">
<div class="divider"></div>
<div class="trans-text">${fmt(d.trans)}</div>
<div style="height:1.5rem"></div>
<button class="btn-ghost" id="${btnId}" onclick="go(step+1)">${d.btn||'继续'}</button>
</div>`;
    setTimeout(()=>{const b=document.getElementById(btnId);if(b)b.classList.add('show')},3600);
  }else{
    let head='';
    if(d.act) head=`<div class="act-label">${d.act}</div><div class="act-title">${d.actTitle}</div><div class="divider"></div><div class="act-sub">${fmt(d.actSub)}</div><div style="height:0.6rem"></div><div class="divider"></div>`;
    else head=`<div class="divider"></div>`;
    let opts=d.opts.map((o,i)=>`<button class="btn" onclick="doChoose('${String.fromCharCode(65+i)}')">${fmt(o)}</button>`).join('');
    h=`<div class="scene active" data-i="${idx}">
${head}
<div class="scene-text">${fmt(d.body)}</div>
<div class="question">${fmt(d.q)}</div>
${opts}
<p style="color:#6a6358;font-size:0.72rem;text-align:center;margin-top:1.2rem;letter-spacing:0.1em;line-height:1.8">不必寻找正确答案<br>你最先选中的 往往就是此刻的自己</p>
</div>`;
  }

  const old=app.querySelector('.scene.active');
  if(old){old.classList.remove('active');old.classList.add('exit');setTimeout(()=>old.remove(),1400)}
  app.insertAdjacentHTML('beforeend',h);
  step=idx;
}

function doStart(){
  const inp=document.getElementById('ni');
  const v=inp?inp.value.trim():'';
  if(!v){inp.style.borderColor='rgba(232,100,75,0.6)';inp.placeholder='请留下你的名字';return}
  userName=v;
  go(1);
}

function doChoose(c){
  choices.push(c);
  go(step+1);
}

function copyWx(){
  const t='SL2025V';
  if(navigator.clipboard){navigator.clipboard.writeText(t).then(()=>showCopyOk())}
  else{const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showCopyOk()}
}
function showCopyOk(){
  const b=document.querySelector('.copy-btn');
  if(b){b.textContent='已复制 ✓';setTimeout(()=>{b.textContent='复制微信号'},1500)}
}

function shareLink(){
  const url=location.href;
  if(navigator.clipboard){
    navigator.clipboard.writeText(url).then(()=>{
      showToast('链接已复制 去微信发给朋友吧 ✨',2500);
    }).catch(()=>fallbackCopy(url));
  }else{fallbackCopy(url)}
}
function fallbackCopy(text){
  const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
  showToast('链接已复制 去微信发给朋友吧 ✨',2500);
}

function saveReport(){
  showToast('请截图保存这一刻 ✨',2500);
}

function restartExperience(){
  choices=[];
  userName='';
  step=0;
  document.getElementById('app').innerHTML='';
  go(0);
}

function submitData(r,name){
  const payload={
    "用户姓名":name,
    "选择序列":choices.join(','),
    "主状态":CN[r.primary]+' '+r.primary,
    "副状态":CN[r.secondary]+' '+r.secondary,
    "是否过渡":r.isTr?'是':'否',
    "薇流FLOW":r.pct.FLOW,
    "薇连BOND":r.pct.BOND,
    "薇稳GROUND":r.pct.GROUND,
    "薇光LIGHT":r.pct.LIGHT,
    "薇生ASCENT":r.pct.ASCENT
  };
  fetch('https://submit-proxy-feishu8-zep4.vercel.app/api/submit',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).catch(()=>{});
}

go(0);
</script>
</body>
</html>
